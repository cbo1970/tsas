<mat-toolbar color="primary">
  <mat-icon>sports_tennis</mat-icon>
  <span class="app-title">TSaS – Tennis Score &amp; Statistic</span>
  <span class="spacer"></span>
  <a mat-button routerLink="/players" routerLinkActive="active-link">
    <mat-icon>people</mat-icon> Spieler
  </a>
  <a mat-button routerLink="/matches/new" routerLinkActive="active-link">
    <mat-icon>add_circle</mat-icon> Neues Match
  </a>
  @if (authService.isAdmin()) {
    <mat-chip class="admin-badge" data-cy="admin-badge" highlighted>
      <mat-icon matChipAvatar>shield</mat-icon>
      ADMIN
    </mat-chip>
  }
  @if (userName()) {
    <span class="user-name">{{ userName() }}</span>
    <button mat-icon-button [matMenuTriggerFor]="userMenu" data-cy="user-menu-trigger" aria-label="Benutzermenü">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #userMenu="matMenu">
      <button mat-menu-item data-cy="export-my-data" (click)="exportMyData()">
        <mat-icon>file_download</mat-icon>
        <span>Daten exportieren</span>
      </button>
      <button mat-menu-item class="danger-item" data-cy="delete-my-data" (click)="deleteMyData()">
        <mat-icon>delete_forever</mat-icon>
        <span>Konto-Daten löschen</span>
      </button>
      <mat-divider />
      <button mat-menu-item (click)="logout()">
        <mat-icon>logout</mat-icon>
        <span>Abmelden</span>
      </button>
    </mat-menu>
  }
</mat-toolbar>
<main>
  <router-outlet />
</main>
