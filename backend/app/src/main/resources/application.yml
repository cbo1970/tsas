spring:
  application:
    name: tsas-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tsas}
    username: ${DB_USERNAME:tsas}
    password: ${DB_PASSWORD:tsas}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tsas}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8180/realms/tsas/protocol/openid-connect/certs}

tsas:
  cors:
    allowed-origins:
      - "http://localhost:4200"
      - "https://localhost:4200"
      - "http://192.168.1.101:4200"
      - "https://192.168.1.101:4200"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
