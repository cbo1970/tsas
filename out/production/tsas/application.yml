spring:
  application:
    name: tsas-backend

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tsas}
    username: ${DB_USERNAME:tsas}
    password: ${DB_PASSWORD:tsas}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # TODO (V1): Uncomment and configure when Keycloak is set up
  # security:
  #   oauth2:
  #     resourceserver:
  #       jwt:
  #         issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/tsas}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
