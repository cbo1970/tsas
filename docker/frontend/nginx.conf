# Per-IP token bucket for the cost-sensitive AI analysis endpoint (TEN-64 / STRIDE D1+D2).
# 5 requests per minute baseline, burst of 5 allows brief spikes; sustained traffic is
# throttled. nodelay rejects immediately instead of queuing. Backend (Bucket4j) enforces
# the per-user cap; this nginx gate adds an IP-scoped guard in front of registration
# floods. Must live at http scope — conf.d/*.conf is included inside nginx's http block.
limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/m;
limit_req_status 429;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (TEN-62 / STRIDE T1) -----------------------------
    # `always` propagates the headers to non-2xx responses too. Headers declared
    # at server scope are inherited by every location, as long as no `location`
    # block defines its own `add_header` directive (nginx replaces, never merges).
    #
    # HSTS — only effective once the reverse proxy in front of nginx terminates
    # TLS; harmless when reached over HTTP (browsers ignore it from HTTP origin).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # Permissions-Policy — disable interfaces the SPA does not need so that a
    # successful XSS cannot escalate into device-API access.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    # CSP — `'unsafe-inline'` for style-src is required by Angular Material's
    # runtime style injection (no SSR / no nonces in this build). connect-src /
    # form-action include the Keycloak realm so the OAuth2/PKCE flow works.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://localhost:8443; frame-src 'self' https://localhost:8443; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://localhost:8443" always;

    # AI analysis endpoint — IP-scoped rate-limit gate before the proxy (TEN-64).
    # Regex location takes precedence over the prefix /api/ block below.
    location ~ ^/api/matches/[^/]+/analysis$ {
        limit_req zone=ai burst=5 nodelay;
        proxy_pass http://backend:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy API calls to the backend container
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Angular SPA — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
