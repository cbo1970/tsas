# Production nginx config for the Angular SPA (TEN-58 / STRIDE T1).
# Terminates TLS on port 8443 (mapped to host 443) and redirects plain-HTTP
# requests on 8080 (mapped to host 80) to HTTPS. Uses the same security
# headers and API-proxy logic as nginx.conf, plus the TLS bits.

# Per-IP token bucket for the cost-sensitive AI analysis endpoint (TEN-64).
limit_req_zone $binary_remote_addr zone=ai:10m rate=5r/m;
limit_req_status 429;

# 1. HTTP listener on 8080 — redirect everything to HTTPS (TEN-58 / STRIDE T1).
#    Host port 80 maps here; one hop and the user is on HTTPS.
server {
    listen 8080;
    server_name _;
    return 301 https://$host$request_uri;
}

# 2. HTTPS listener on 8443 — serves the Angular SPA + proxies /api/.
server {
    listen 8443 ssl;
    http2 on;
    server_name _;

    # Certificate and key are mounted into the container at
    # /etc/nginx/certs/ (Docker bind-mount or secret).
    ssl_certificate     /etc/nginx/certs/tls.crt;
    ssl_certificate_key /etc/nginx/certs/tls.key;

    # Mozilla "intermediate" profile (Jun 2025). Strong without breaking
    # older mobile browsers.
    ssl_protocols           TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache       shared:SSL:10m;
    ssl_session_timeout     1d;
    ssl_session_tickets     off;

    root /usr/share/nginx/html;
    index index.html;

    # ---- Security headers (TEN-62 / STRIDE T1) -----------------------------
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=(), fullscreen=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self' https://keycloak; frame-src 'self' https://keycloak; frame-ancestors 'none'; object-src 'none'; base-uri 'self'; form-action 'self' https://keycloak" always;

    # AI analysis endpoint — IP-scoped rate-limit gate (TEN-64).
    location ~ ^/api/matches/[^/]+/analysis$ {
        limit_req zone=ai burst=5 nodelay;
        proxy_pass http://backend:8080$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Proxy API calls to the backend container.
    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Angular SPA — all unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
