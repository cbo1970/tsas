services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME:-tsas}
      POSTGRES_USER: ${DB_USERNAME:-tsas}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tsas}
    volumes:
      - ../volume/postgres:/var/lib/postgresql/data
    read_only: true
    tmpfs:
      - /tmp:size=64M
      - /var/run/postgresql:size=8M
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    cap_add: [CHOWN, SETGID, SETUID, DAC_READ_SEARCH, FOWNER]
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-tsas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    command: >
      start-dev --import-realm
      --health-enabled=true
      --https-port=8443
      --https-certificate-file=/opt/keycloak/certs/localhost.pem
      --https-certificate-key-file=/opt/keycloak/certs/localhost-key.pem
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-admin}
      # SMTP settings consumed by ${env.…} placeholders in realm-export.json.
      # Dev defaults wire to the local mailhog service; prod overrides via .env
      # (e.g. KC_SMTP_HOST=smtp.sendgrid.net, KC_SMTP_AUTH=true, KC_SMTP_USER, KC_SMTP_PASSWORD).
      KC_SMTP_HOST: ${KC_SMTP_HOST:-mailhog}
      KC_SMTP_PORT: ${KC_SMTP_PORT:-1025}
      KC_SMTP_FROM: ${KC_SMTP_FROM:-noreply@tsas.local}
      KC_SMTP_FROM_NAME: ${KC_SMTP_FROM_NAME:-TSaS}
      KC_SMTP_REPLY_TO: ${KC_SMTP_REPLY_TO:-noreply@tsas.local}
      KC_SMTP_ENVELOPE_FROM: ${KC_SMTP_ENVELOPE_FROM:-noreply@tsas.local}
      KC_SMTP_STARTTLS: ${KC_SMTP_STARTTLS:-false}
      KC_SMTP_SSL: ${KC_SMTP_SSL:-false}
      KC_SMTP_AUTH: ${KC_SMTP_AUTH:-false}
      KC_SMTP_USER: ${KC_SMTP_USER:-}
      KC_SMTP_PASSWORD: ${KC_SMTP_PASSWORD:-}
    volumes:
      - ./keycloak:/opt/keycloak/data/import
      - ./keycloak/certs:/opt/keycloak/certs
      - keycloak_data:/opt/keycloak/data/h2
    ports:
      - "8443:8443"
      - "18080:8080"
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 768m
    cpus: 1.0
    # The Keycloak image ships no curl/wget. The management port 9000
    # (enabled via --health-enabled=true) only opens once Quarkus has
    # fully started, so a TCP connect probe via bash /dev/tcp is a
    # reliable liveness signal.
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/9000"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 60s

  mailhog:
    # SMTP sink for Keycloak's verifyEmail flow (TEN-64). UI on 8025, SMTP on 1025;
    # the realm-export points smtpServer.host=mailhog (Docker service DNS).
    image: mailhog/mailhog:latest
    ports:
      - "8025:8025"
    read_only: true
    tmpfs:
      - /tmp:size=16M
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 64m
    cpus: 0.25

  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://db:5432/${DB_NAME:-tsas}
      DB_USERNAME: ${DB_USERNAME:-tsas}
      DB_PASSWORD: ${DB_PASSWORD:-tsas}
      KEYCLOAK_ISSUER_URI: https://localhost:8443/realms/tsas
      KEYCLOAK_JWK_SET_URI: http://keycloak:8080/realms/tsas/protocol/openid-connect/certs
    ports:
      - "8080:8080"
    read_only: true
    tmpfs:
      - /tmp:size=128M
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 768m
    cpus: 1.0
    depends_on:
      db:
        condition: service_healthy
      keycloak:
        condition: service_healthy

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
    ports:
      - "80:8080"
    read_only: true
    tmpfs:
      - /tmp:size=16M
      - /var/cache/nginx:size=32M
      - /var/run:size=4M
    security_opt:
      - no-new-privileges:true
    cap_drop: [ALL]
    mem_limit: 128m
    cpus: 0.5
    depends_on:
      - backend

volumes:
  keycloak_data:
