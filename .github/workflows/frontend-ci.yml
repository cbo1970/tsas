name: Frontend CI

on:
  push:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches: [develop, main]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

permissions:
  contents: read

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # Cache the Cypress binary (lives outside node_modules) so component-test
      # runs don't re-download it every time.
      - name: Cache Cypress binary
        uses: actions/cache@v5
        with:
          path: ~/.cache/Cypress
          key: cypress-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: cypress-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests (Vitest)
        run: npx ng test --no-watch

      - name: Component tests (Cypress)
        run: npx cypress run --component

      # Cypress writes screenshots on failure — surface them for debugging.
      - name: Upload Cypress screenshots
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: cypress-screenshots
          path: frontend/cypress/screenshots/
          if-no-files-found: ignore
